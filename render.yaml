services:
  - type: web
    name: smart-library-system
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /data/library.db
    disk:
      name: library-data
      mountPath: /data
      sizeGB: 1
